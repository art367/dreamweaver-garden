<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamweaver – Daydreamer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #dff0f8 0%, #ede8ff 55%, #e2f5ec 100%);
    color: #3d4a5c;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }

  #start-screen h1 {
    font-size: 3.2rem;
    letter-spacing: 0.18em;
    color: #7c6fae;
    text-shadow: 0 2px 24px rgba(120,100,200,0.18);
    margin-bottom: 8px;
  }

  #start-screen p {
    font-size: 1.05rem;
    letter-spacing: 0.26em;
    color: rgba(90,110,150,0.75);
    margin-bottom: 50px;
    text-transform: uppercase;
  }

  #start-btn {
    background: transparent;
    border: 1.5px solid rgba(120,100,190,0.45);
    color: #7c6fae;
    font-family: 'Georgia', serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    padding: 14px 42px;
    cursor: pointer;
    border-radius: 40px;
    transition: all 0.4s ease;
    text-transform: uppercase;
  }

  #start-btn:hover {
    background: rgba(120,100,190,0.07);
    border-color: #7c6fae;
    box-shadow: 0 0 20px rgba(120,100,190,0.15);
  }

  #session-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    padding: 20px;
  }

  canvas#chakra-fig {
    width: 180px;
    height: 270px;
    margin-bottom: 20px;
    filter: drop-shadow(0 4px 24px rgba(140,100,210,0.22));
  }

  #subtitle {
    font-size: 0.78rem;
    letter-spacing: 0.3em;
    color: rgba(100,120,160,0.55);
    text-transform: uppercase;
    margin-bottom: 26px;
  }

  #line-text {
    max-width: 560px;
    text-align: center;
    font-size: 1.22rem;
    line-height: 1.95;
    color: rgba(50,65,95,0.85);
    min-height: 80px;
    padding: 0 20px;
    transition: opacity 0.8s ease;
    font-style: italic;
  }

  #progress-bar {
    position: fixed;
    bottom: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg,#e57373,#ffb74d,#fff176,#81c784,#4fc3f7,#9575cd,#ce93d8);
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(140,100,210,0.35);
  }

  #end-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }

  #end-screen h2 {
    font-size: 2rem;
    color: #7c6fae;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }

  #end-screen p {
    color: rgba(90,110,150,0.65);
    font-size: 1rem;
    letter-spacing: 0.15em;
    margin-bottom: 36px;
  }

  #restart-btn {
    background: transparent;
    border: 1.5px solid rgba(120,100,190,0.4);
    color: #7c6fae;
    font-family: 'Georgia', serif;
    font-size: 0.9rem;
    letter-spacing: 0.18em;
    padding: 12px 36px;
    cursor: pointer;
    border-radius: 40px;
    text-transform: uppercase;
    transition: all 0.4s ease;
  }

  #restart-btn:hover { background: rgba(120,100,190,0.07); }
</style>
</head>
<body>

<div id="app">
  <div id="start-screen">
    <h1>Dreamweaver</h1>
    <p>Daydreamer</p>
    <button id="start-btn">Begin Your Morning</button>
  </div>

  <div id="session-screen">
    <canvas id="chakra-fig" width="180" height="270"></canvas>
    <div id="subtitle">Breathe &amp; Awaken</div>
    <div id="line-text"></div>
  </div>

  <div id="end-screen">
    <h2>Good Morning ☀️</h2>
    <p>Step into your beautiful day</p>
    <button id="restart-btn">Begin Again</button>
  </div>
</div>

<div id="progress-bar"></div>

<script>
// ─── LINES ───────────────────────────────────────────────────────────────────
const LINES = [
  "Welcome to Dreamweaver… your guide to a beautiful morning… … … …Take a gentle breath… and begin to wake…",
  "Good morning… beautiful soul… the world is waiting for you…",
  "You have slept… and now… a new day opens before you… like a flower…",
  "Breathe in slowly… feel the warmth of the morning light… on your skin…",
  "Imagine yourself… stepping through a wooden gate… into an English country garden…",
  "The air is soft… and sweet… with the scent of roses… and fresh earth…",
  "Bees hum gently… among the lavender… and somewhere… a robin sings…",
  "You walk along a gravel path… dappled with sunlight… filtering through old oak trees…",
  "Ahead of you… a meadow of sunflowers… tall and golden… all facing the morning sun…",
  "You are the sunflower… you too… face the light…",
  "With each breath in… breathe in possibility… with each breath out… release what no longer serves you…",
  "You are healthy… you are whole… you are filled with life…",
  "Today… you will do something kind… for yourself… and for someone else…",
  "You have everything you need… inside you… right now…",
  "Feel your fingers… your toes… waking gently… stretching like the petals of a flower…",
  "You are grounded… like the roots beneath this beautiful garden…",
  "And you are reaching upward… like every stem and bloom… toward the sun…",
  "Today is a gift… and you are worthy of receiving it…",
  "Think of one thing… that brings you joy… hold it in your heart… like a warm stone…",
  "Carry that joy… into your morning… let it colour everything you do…",
  "You are loved… more than you know…",
  "You are capable… of more than you believe…",
  "The garden reminds you… that everything blooms in its own time…",
  "Be patient with yourself… be gentle… be kind…",
  "Today… take one small step… toward something that matters to you…",
  "Notice the beauty around you… it has always been there… waiting to be seen…",
  "You are part of something wonderful… this world… this morning… this life…",
  "You feel refreshed… renewed… ready…",
  "A butterfly lands nearby… its wings catching the light… a small miracle… just for you…",
  "Everything is unfolding… exactly as it should…",
  "Slowly… gently… begin to feel your body… awake and alive…",
  "Wiggle your fingers… roll your shoulders… take one long… deep breath…",
  "Let a smile find its way to your face… however small… it is real…",
  "You are the gardener of your own life… tend it with love…",
  "Open your eyes when you're ready… and step into your day…",
  "This is your morning… make it magnificent…",
  "You are ready… you are capable… you are enough…",
  "Go gently… go joyfully… go with intention…",
  "Good morning… beautiful soul…"
];

// ─── CHAKRAS ─────────────────────────────────────────────────────────────────
const CHAKRAS = [
  { y: 222, color: '#e53935' },  // Root
  { y: 198, color: '#fb8c00' },  // Sacral
  { y: 172, color: '#fdd835' },  // Solar Plexus
  { y: 146, color: '#43a047' },  // Heart
  { y: 120, color: '#1e88e5' },  // Throat
  { y:  96, color: '#5e35b1' },  // Third Eye
  { y:  60, color: '#ab47bc' },  // Crown
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let ambientEl = null, voiceEl = null;
let currentLine = 0, animFrame = null, pulseT = 0;
const TOTAL = LINES.length;

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('chakra-fig');
const cctx   = canvas.getContext('2d');

function drawLotus(cx, cy, t) {
  // Outer petals
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2;
    const px = cx + Math.cos(angle) * 30;
    const py = cy + Math.sin(angle) * 12;
    cctx.save();
    cctx.translate(px, py);
    cctx.rotate(angle + Math.PI / 2);
    cctx.beginPath();
    cctx.ellipse(0, 0, 9, 19, 0, 0, Math.PI * 2);
    const a = 0.45 + 0.2 * Math.sin(t * 0.8 + i * 0.6);
    cctx.fillStyle = `rgba(219,160,196,${a})`;
    cctx.strokeStyle = `rgba(190,120,165,0.5)`;
    cctx.lineWidth = 0.7;
    cctx.fill(); cctx.stroke();
    cctx.restore();
  }
  // Inner petals
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2 + 0.3;
    const px = cx + Math.cos(angle) * 14;
    const py = cy + Math.sin(angle) * 6;
    cctx.save();
    cctx.translate(px, py);
    cctx.rotate(angle + Math.PI / 2);
    cctx.beginPath();
    cctx.ellipse(0, 0, 6, 13, 0, 0, Math.PI * 2);
    cctx.fillStyle = 'rgba(255,200,220,0.7)';
    cctx.strokeStyle = 'rgba(210,150,180,0.4)';
    cctx.lineWidth = 0.6;
    cctx.fill(); cctx.stroke();
    cctx.restore();
  }
  cctx.beginPath();
  cctx.arc(cx, cy, 7, 0, Math.PI * 2);
  cctx.fillStyle = 'rgba(255,220,150,0.85)';
  cctx.fill();
}

function drawFigure(cx, t) {
  cctx.strokeStyle = 'rgba(110,85,160,0.42)';
  cctx.lineWidth = 1.6;
  cctx.lineCap = 'round';
  cctx.lineJoin = 'round';
  // Head
  cctx.beginPath();
  cctx.arc(cx, 60, 20, 0, Math.PI * 2);
  cctx.stroke();
  // Neck
  cctx.beginPath(); cctx.moveTo(cx, 80); cctx.lineTo(cx, 95); cctx.stroke();
  // Shoulders arc
  cctx.beginPath();
  cctx.moveTo(cx - 32, 112);
  cctx.bezierCurveTo(cx - 18, 100, cx + 18, 100, cx + 32, 112);
  cctx.stroke();
  // Left arm to knee
  cctx.beginPath();
  cctx.moveTo(cx - 32, 112);
  cctx.bezierCurveTo(cx - 44, 148, cx - 48, 185, cx - 38, 204);
  cctx.stroke();
  // Right arm to knee
  cctx.beginPath();
  cctx.moveTo(cx + 32, 112);
  cctx.bezierCurveTo(cx + 44, 148, cx + 48, 185, cx + 38, 204);
  cctx.stroke();
  // Torso left
  cctx.beginPath();
  cctx.moveTo(cx - 20, 104);
  cctx.bezierCurveTo(cx - 24, 150, cx - 26, 185, cx - 16, 215);
  cctx.stroke();
  // Torso right
  cctx.beginPath();
  cctx.moveTo(cx + 20, 104);
  cctx.bezierCurveTo(cx + 24, 150, cx + 26, 185, cx + 16, 215);
  cctx.stroke();
  // Left leg
  cctx.beginPath();
  cctx.moveTo(cx - 16, 215);
  cctx.bezierCurveTo(cx - 28, 228, cx - 50, 238, cx - 54, 248);
  cctx.bezierCurveTo(cx - 36, 254, cx - 8, 254, cx, 252);
  cctx.stroke();
  // Right leg
  cctx.beginPath();
  cctx.moveTo(cx + 16, 215);
  cctx.bezierCurveTo(cx + 28, 228, cx + 50, 238, cx + 54, 248);
  cctx.bezierCurveTo(cx + 36, 254, cx + 8, 254, cx, 252);
  cctx.stroke();
  // Hands
  cctx.beginPath(); cctx.arc(cx - 38, 206, 5, 0, Math.PI * 2); cctx.stroke();
  cctx.beginPath(); cctx.arc(cx + 38, 206, 5, 0, Math.PI * 2); cctx.stroke();
}

function drawChakraFig(t) {
  cctx.clearRect(0, 0, canvas.width, canvas.height);
  drawLotus(canvas.width / 2, 258, t);
  drawFigure(canvas.width / 2, t);
  // Draw chakras
  const cx = canvas.width / 2;
  CHAKRAS.forEach(function(ch, i) {
    const pulse = 0.65 + 0.35 * Math.sin(t * 1.1 + i * 0.9);
    const r = 7 * pulse;
    // Glow
    const g = cctx.createRadialGradient(cx, ch.y, 0, cx, ch.y, r * 3);
    g.addColorStop(0, ch.color + 'cc');
    g.addColorStop(0.5, ch.color + '55');
    g.addColorStop(1, ch.color + '00');
    cctx.beginPath(); cctx.arc(cx, ch.y, r * 3, 0, Math.PI * 2);
    cctx.fillStyle = g; cctx.fill();
    // Core dot
    cctx.beginPath(); cctx.arc(cx, ch.y, r, 0, Math.PI * 2);
    cctx.fillStyle = ch.color; cctx.fill();
  });
}

function animateChakra() {
  pulseT += 0.022;
  drawChakraFig(pulseT);
  animFrame = requestAnimationFrame(animateChakra);
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
function setLineText(text, visible) {
  const el = document.getElementById('line-text');
  el.style.opacity = visible ? '1' : '0';
  if (text !== null) el.textContent = text;
}

function updateProgress() {
  document.getElementById('progress-bar').style.width = ((currentLine / TOTAL) * 100) + '%';
}

function onVoiceEnded() {
  setLineText(null, false);
  setTimeout(function() { playLine(currentLine + 1); }, 1800);
}

function onVoiceError() {
  var ms = Math.max(3000, LINES[currentLine].split(' ').length * 350);
  setTimeout(function() {
    setLineText(null, false);
    setTimeout(function() { playLine(currentLine + 1); }, 600);
  }, ms);
}

function playLine(idx) {
  if (idx >= TOTAL) { endSession(); return; }
  currentLine = idx;
  updateProgress();
  setLineText(LINES[idx], false);
  setTimeout(function() { setLineText(LINES[idx], true); }, 300);
  var pad = String(idx).padStart(2, '0');
  voiceEl.src = 'audio/garden_line_' + pad + '.mp3';
  var p = voiceEl.play();
  if (p !== undefined) p.catch(function() { onVoiceError(); });
}

// ─── SESSION ─────────────────────────────────────────────────────────────────
function startSession() {
  var ss = document.getElementById('start-screen');
  ss.style.opacity = '0'; ss.style.pointerEvents = 'none';
  setTimeout(function() {
    ss.style.display = 'none';
    document.getElementById('session-screen').style.display = 'flex';
  }, 400);

  ambientEl = new Audio('audio/garden_ambient.mp3');
  ambientEl.loop = true; ambientEl.volume = 0.25;
  ambientEl.play().catch(function() {});

  voiceEl = new Audio();
  voiceEl.setAttribute('playsinline', '');
  voiceEl.onended = onVoiceEnded;
  voiceEl.onerror = onVoiceError;

  animateChakra();
  setTimeout(function() { playLine(0); }, 1200);
}

function endSession() {
  cancelAnimationFrame(animFrame);
  if (ambientEl) { ambientEl.pause(); ambientEl = null; }
  if (voiceEl)   { voiceEl.pause(); voiceEl.src = ''; voiceEl = null; }
  document.getElementById('session-screen').style.display = 'none';
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('end-screen').style.display = 'flex';
}

function restartSession() {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  currentLine = 0;
  startSession();
}

document.getElementById('start-btn').addEventListener('click', startSession);
document.getElementById('restart-btn').addEventListener('click', restartSession);
</script>
</body>
</html>
